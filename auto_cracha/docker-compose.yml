version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: crachapp_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crachapp}
      POSTGRES_USER: ${POSTGRES_USER:-crachapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crachapp_senha_123456}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crachapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - crachapp_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: crachapp_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_senha_123456}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - crachapp_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crachapp_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crachapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crachapp}
      SECRET_KEY: ${SECRET_KEY}
      CLOUDINARY_URL: ${CLOUDINARY_URL}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      APP_URL: ${APP_URL:-https://crachapp.com.br}
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - crachapp_network
    command: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000

  # Frontend Web
  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: crachapp_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - crachapp_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  crachapp_network:
    driver: bridge
